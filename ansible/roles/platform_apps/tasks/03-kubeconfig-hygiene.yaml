---
- name: Copy kubeconfig hygiene script
  copy:
    src: kubeconfig-hygiene.sh
    dest: /tmp/kubeconfig-hygiene.sh
    mode: '0755'
  delegate_to: localhost

- name: Run kubeconfig hygiene
  shell: |
    /tmp/kubeconfig-hygiene.sh "{{ kubeconfig }}" "{{ cluster_name }}" "{{ argocd_namespace | default('argocd') }}"
  delegate_to: localhost
  register: hygiene_result

- name: Show hygiene result
  debug:
    msg: "{{ hygiene_result.stdout_lines }}"
  when: hygiene_result.stdout is defined

- name: Clean up hygiene script
  file:
    path: /tmp/kubeconfig-hygiene.sh
    state: absent
  delegate_to: localhost