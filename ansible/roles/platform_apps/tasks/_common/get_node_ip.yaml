---
- name: Get IP of {{ node_name }} with runtime awareness
  delegate_to: localhost
  vars:
    interfaces_to_try:
      - "{{ net_iface }}"
      - "eth0"
      - "enp5s0"
      - "ens3"
      - "enp0s3"
  shell: |
    for iface in {{ interfaces_to_try | join(' ') }}; do
      ip=$(lxc list {{ node_name }} --format json | \
        jq -r --arg iface "$iface" '.[0].state.network[$iface].addresses[]? | select(.family=="inet") | .address' | \
        head -1)
      if [ -n "$ip" ]; then
        echo "$ip"
        exit 0
      fi
    done
    exit 1
  register: node_ip
  until: node_ip.stdout | length > 0
  retries: "{{ 30 if runtime_type == 'vm' else 15 }}"
  delay: "{{ 5 if runtime_type == 'vm' else 2 }}"
  changed_when: false
