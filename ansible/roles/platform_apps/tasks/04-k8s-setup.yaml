---
- name: Get current server IP from kubeconfig
  shell: |
    kubectl config view --kubeconfig={{ kubeconfig }} -o jsonpath='{.clusters[0].cluster.server}' | sed 's|https://\(.*\):.*|\1|'
  register: kubeconfig_server_ip
  changed_when: false
  run_once: true
  delegate_to: localhost

- name: Get current IP of first node
  include_role:
    name: helpers
    tasks_from: get_node_ip
  vars:
    node_name: "{{ groups['k3s_cluster'][0] }}"

- name: Update kubeconfig server if IP mismatch
  shell: |
    kubectl config set-cluster {{ cluster_name }} --server=https://{{ node_ip }}:6443 --kubeconfig={{ kubeconfig }}
  when: node_ip != kubeconfig_server_ip.stdout
  run_once: true
  delegate_to: localhost

- name: Verify cluster access after potential IP update
  shell: "kubectl --kubeconfig {{ kubeconfig }} get nodes"
  register: nodes_verify
  changed_when: false
  run_once: true
  delegate_to: localhost

- name: Create ArgoCD namespace using kubectl
  shell: |
    kubectl --kubeconfig {{ kubeconfig }} create namespace {{ argocd_ns }} --dry-run=client -o yaml | \
    kubectl --kubeconfig {{ kubeconfig }} apply -f -
  register: ns_create
  changed_when: "'created' in ns_create.stdout or 'configured' in ns_create.stdout"
  run_once: true
  delegate_to: localhost

- name: Create ArgoCD Age Secret using kubectl
  shell: |
    kubectl --kubeconfig {{ kubeconfig }} create secret generic argocd-age-secret-keys \
      --namespace {{ argocd_ns }} \
      --from-file=keys.txt={{ lookup('env', 'HOME') }}/.config/sops/age/keys.txt \
      --dry-run=client -o yaml | \
    kubectl --kubeconfig {{ kubeconfig }} apply -f -
  register: secret_create
  changed_when: "'created' in secret_create.stdout or 'configured' in secret_create.stdout"
  run_once: true
  delegate_to: localhost
