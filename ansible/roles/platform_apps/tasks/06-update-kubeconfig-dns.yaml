---
- name: Update kubeconfig to use API DNS
  shell: |
    kubectl config set-cluster {{ cluster_name }} \
      --server=https://{{ api_dns }}:6443 \
      --kubeconfig={{ kubeconfig }}
  register: dns_update
  changed_when: "'set' in dns_update.stdout"
  failed_when: dns_update.rc != 0
  run_once: true
  delegate_to: localhost

- name: Verify kubeconfig works with DNS
  shell: "kubectl --kubeconfig {{ kubeconfig }} get nodes"
  register: verify_dns
  changed_when: false
  run_once: true
  delegate_to: localhost

- name: Show current context
  debug:
    msg: "Kubeconfig now using API DNS: {{ api_dns }}"
  run_once: true
  delegate_to: localhost
