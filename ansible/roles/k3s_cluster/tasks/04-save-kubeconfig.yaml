---
- name: Get kubeconfig from first node
  delegate_to: localhost
  shell: |
    lxc exec {{ groups['k3s_cluster'][0] }} -- cat /etc/rancher/k3s/k3s.yaml
  register: kubeconfig_content
  changed_when: false
  run_once: true

- name: Get IP of first node
  delegate_to: localhost
  shell: |
    lxc list {{ groups['k3s_cluster'][0] }} --format json | \
    jq -r '.[0].state.network.eth0.addresses[] | select(.family=="inet") | .address' | \
    head -1
  register: first_node_ip
  changed_when: false
  run_once: true

- name: Update kubeconfig with correct server IP
  set_fact:
    updated_kubeconfig: "{{ kubeconfig_content.stdout | replace('127.0.0.1', first_node_ip.stdout) }}"
  run_once: true

- name: Create kubeconfig directory
  file:
    path: "{{ lookup('env', 'HOME') }}/.kube/clusters"
    state: directory
    mode: '0755'
  delegate_to: localhost
  run_once: true

- name: Save kubeconfig locally
  copy:
    content: "{{ updated_kubeconfig }}"
    dest: "{{ lookup('env', 'HOME') }}/.kube/clusters/{{ cluster_name }}.yaml"
    mode: '0600'
  delegate_to: localhost
  run_once: true

- name: Set permissions
  file:
    path: "{{ lookup('env', 'HOME') }}/.kube/clusters/{{ cluster_name }}.yaml"
    mode: '0600'
  delegate_to: localhost
  run_once: true

- name: Verify kubeconfig works
  delegate_to: localhost
  shell: "kubectl --kubeconfig {{ lookup('env', 'HOME') }}/.kube/clusters/{{ cluster_name }}.yaml get nodes"
  register: verify
  changed_when: false
  run_once: true

- name: Show cluster nodes
  debug:
    msg: "{{ verify.stdout_lines }}"
  run_once: true