---
# yaml-language-server: $schema=https://json.schemastore.org/helmfile
#
bases:
  - ../environments.yaml

repositories:
  - name: bedag
    url: https://bedag.github.io/helm-charts

releases:
  - name: cert-manager-cloudflare-token
    chart: bedag/raw
    namespace: security
    version: 2.0.2
    secrets:
      - ../../platform/security/cert-manager/cloudflare-cert-manager-token-sops.yaml

  - name: cert-manager
    namespace: security
    chart: oci://quay.io/jetstack/charts/cert-manager
    version: v1.20.1
    values:
      - ../../platform/security/cert-manager/values.yaml

  - name: cert-manager-resources
    namespace: security
    chart: bedag/raw
    version: 2.0.2
    values:
      - ../../platform/security/cert-manager/resources.yaml.gotmpl
    needs:
      - security/cert-manager

  - name: external-secrets
    namespace: security
    chart: oci://ghcr.io/external-secrets/charts/external-secrets
    version: 2.3.0
    values:
      - ../../platform/security/external-secrets/values.yaml
    needs:
      - security/cert-manager-resources

  - name: bitwarden-access-token
    namespace: security
    chart: bedag/raw
    version: 2.0.2
    secrets:
      - ../../platform/security/external-secrets/bitwarden-access-token-sops.yaml

  - name: bitwarden-store
    namespace: security
    chart: bedag/raw
    version: 2.0.2
    values:
      - ../../platform/security/external-secrets/bitwarden-store.yaml
    needs:
      - security/external-secrets
      - security/bitwarden-access-token

  - name: argocd-externalsecret
    namespace: argocd
    chart: bedag/raw
    version: 2.0.2
    values:
      - ../../platform/gitops/argocd/externalsecret.yaml
    needs:
      - security/bitwarden-store
