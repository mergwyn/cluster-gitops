---
# yaml-language-server: $schema=https://json.schemastore.org/helmfile

bases:
  - ../../../clusters/environments.yaml

repositories:
  - name: bedag
    url: https://bedag.github.io/helm-charts/

releases:
  - name: nfs-media
    namespace: &ns kube-system
    chart: bedag/raw
    version: 2.0.2
    values:
      - resources:
          # media
          - apiVersion: v1
            kind: PersistentVolume
            metadata:
              name: nfs-media-pv
              labels: &common_labels
                velero.io/exclude-from-backup: "true"
              annotations: &common_annotations
                argocd.argoproj.io/sync-options: "Replace=true"
                meta.helm.sh/release-name:  nfs-media
                meta.helm.sh/release-namespace: *ns
            spec:
              storageClassName: ""
              capacity: { storage: 10Ti }
              accessModes: ["ReadWriteMany"]
              persistentVolumeReclaimPolicy: Retain
              mountOptions: &mount_options
                - nfsvers=4
                - soft
                - intr
                - noatime
                - rsize=1048576
                - wsize=1048576
              nfs:
                path: /srv/media
                server: &nfs_server 10.58.0.12
          - apiVersion: v1
            kind: PersistentVolumeClaim
            metadata:
              name: media-nfs-pvc
              namespace: media
              annotations:
                argocd.argoproj.io/sync-options: "Replace=true"
                meta.helm.sh/release-name: nfs-media
            spec:
              accessModes: ["ReadWriteMany"]
              storageClassName: ""
              resources: { requests: { storage: 10Ti } }
              volumeName: nfs-media-pv

          # vpn
          - apiVersion: v1
            kind: PersistentVolume
            metadata:
              name: nfs-vpn-pv
              labels: *common_labels
              annotations: *common_annotations
            spec:
              storageClassName: ""
              capacity: { storage: 10Ti }
              accessModes: ["ReadWriteMany"]
              persistentVolumeReclaimPolicy: Retain
              mountOptions: *mount_options
              nfs: { path: /srv/media, server: 10.58.0.12 }
          - apiVersion: v1
            kind: PersistentVolumeClaim
            metadata:
              name: vpn-nfs-pvc
              namespace: vpn
              annotations: *common_annotations
            spec:
              accessModes: ["ReadWriteMany"]
              storageClassName: ""
              resources: { requests: { storage: 10Ti } }
              volumeName: nfs-vpn-pv

          # home-assistant
          - apiVersion: v1
            kind: PersistentVolume
            metadata:
              name: nfs-home-assistant-backup-pv
              labels: *common_labels
              annotations: *common_annotations
            spec:
              storageClassName: ""
              capacity: { storage: 10Ti }
              accessModes: ["ReadWriteMany"]
              persistentVolumeReclaimPolicy: Retain
              mountOptions: *mount_options
              nfs:
                path: /srv/backup/home-assistant
                server: *nfs_server
          - apiVersion: v1
            kind: PersistentVolumeClaim
            metadata:
              name: home-assistant-backup-nfs-pvc
              namespace: home-assistant
              annotations: *common_annotations
            spec:
              accessModes: ["ReadWriteMany"]
              storageClassName: ""
              resources: { requests: { storage: 10Ti } }
              volumeName: nfs-home-assistant-backup-pv
