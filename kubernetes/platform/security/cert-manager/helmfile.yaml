---
# yaml-language-server: $schema=https://json.schemastore.org/helmfile

helmDefaults:
  wait: true
  waitForJobs: true

bases:
  - ../../../clusters/environments.yaml

repositories:
  - name: bedag
    url: https://bedag.github.io/helm-charts/
  - name: jetstack
    url: https://charts.jetstack.io/

releases:
  - name: cert-manager-cloudflare-token
    chart: bedag/raw
    version: 2.0.2
    namespace: '{{env "HELMFILE_NAMESPACE" | default "security"}}'
    secrets:
      - cloudflare-cert-manager-token-sops.yaml
    # Wait for cert-manager to be ready? No, this is just a secret

  - name: cert-manager
    chart: jetstack/cert-manager
    version: v1.20.2
    namespace: '{{env "HELMFILE_NAMESPACE" | default "security"}}'
    values:
      - values.yaml

  - name: cert-manager-resources
    chart: bedag/raw
    version: 2.0.2
    namespace: '{{env "HELMFILE_NAMESPACE" | default "security"}}'
    values:
      - resources.yaml.gotmpl
    needs:
      - cert-manager
      - cert-manager-cloudflare-token
