---
# yaml-language-server: $schema=https://raw.githubusercontent.com/KevinNitroG/argocd-json-schema/refs/heads/main/schemas/stable/standalone/v1alpha1applicationset.json

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: bootstrap-handover
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error

  generators:
    - git:
        repoURL: https://github.com/mergwyn/cluster-gitops.git
        revision: &revision main
        files:
          - path: kubernetes/*platform/gitops/*/app.yaml
          - path: kubernetes/*platform/security/*/app.yaml
          - path: kubernetes/*platform/network/*/app.yaml
          - path: kubernetes/*platform/network/cilium/app.yaml
            exclude: true
          - path: kubernetes/*platform/storage/*/app.yaml
            exclude: true
          - path: kubernetes/*platform/vpn/*/app.yaml
            exclude: true
          - path: kubernetes/*core/ingress/traefik/app.yaml

  template:
    metadata:
      name: '{{.path.basename}}'

    spec:
      project: default
      source:
        repoURL: https://github.com/mergwyn/cluster-gitops.git
        targetRevision: *revision
        path: '{{.path.path}}'
        plugin:
          name: helmfile
          env:
            - name: HELMFILE_ENVIRONMENT
              value: dev
            - name: HELMFILE_NAMESPACE
              value: '{{.appNamespace}}'
            - name: HELMFILE_TEMPLATE_OPTIONS
              value: "--include-crds"
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{.appNamespace}}'

      syncPolicy:
        automated:
          allowEmpty: true
          prune: true
          selfHeal: false
        syncOptions:
          - ServerSideApply=true
          - CreateNamespace=true
          - RespectIgnoreDifferences=true
          - SkipDryRunOnMissingResource=true
          - ApplyOutOfSyncOnly=true
      
      ignoreDifferences:
        - group: '*'
          kind: ExternalSecret
          jqPathExpressions:
            - .spec.dataFrom[].extract.conversionStrategy
            - .spec.dataFrom[].extract.decodingStrategy
            - .spec.dataFrom[].extract.metadataPolicy
