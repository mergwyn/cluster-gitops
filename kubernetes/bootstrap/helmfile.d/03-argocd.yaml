---
# yaml-language-server: $schema=https://json.schemastore.org/helmfile

bases:
  - ../environments.yaml

repositories:
  - name: argoproj
    url: https://argoproj.github.io/argo-helm/
  - name: bedag
    url: https://bedag.github.io/helm-charts/

releases:
  - name: argocd-secret
    namespace: argocd
    chart: bedag/raw
    version: 2.0.2
    secrets:
      - ../../apps/gitops/argocd/argocd-secret-sops.yaml

  - name: argocd
    namespace: argocd
    chart: argoproj/argo-cd
    version: 10.1.2
    values:
      - ../../apps/gitops/argocd/values.yaml
    needs:
      - argocd-secret
