---
upgradeCRDs: false

annotations:
  secret.reloader.stakater.com/reload: <-
    minio-s3-conf,
    idrivee2-s3-conf
  configmap.reloader.stakater.com/reload: <-
    velero-backup-repository-config

defaultBackupStorageLocation: rustfs
snapshotsEnabled: false
# defaultVolumeSnapshotLocations: [minio, idrive, default]

configuration:
  uploaderType: kopia
  # defaultVolumesToFsBackup: true
  defaultSnapshotMoveData: true
  features: EnableCSI
  defaultRepoMaintainFrequency: 24h
  defaultExcludedNamespaces:
    - velero
    - kube-system

  backupStorageLocation:
    - name: minio
      default: true
      provider: aws
      bucket: velero
      credential:
        name: minio-s3-conf
        key: cloud
      config:
        region: Northallerton
        s3ForcePathStyle: true
        s3Url: http://delta.theclarkhome.com:9000
        publicUrl: http://delta.theclarkhome.com:9000

    - name: idrive
      provider: aws
      bucket: velero
      credential:
        name: idrivee2-s3-conf
        key: cloud
      config:
        region: London
        s3ForcePathStyle: true
        s3Url: https://j5o6.ldn.idrivee2-27.com
        publicUrl: https://j5o6.ldn.idrivee2-27.com
        # Disable checksumAlgorithm to avoid issues with Minio
        # https://github.com/vmware-tanzu/velero-plugin-for-aws/pull/197
        checksumAlgorithm: ""

  extraArgs:
    - "--backup-repository-configmap=velero-backup-repository-config"

# helmfile values for the velero release
configMaps:
  node-agent-config:
    data:
      config.json: |
        {
          "backupPVC": {
            "longhorn": {
              "storageClass": "longhorn-velero-backup"
            }
          },
          "loadConcurrency": {
            "globalConfig": 1
          }
        }

  backup-repository-config:
    data:
      "kopia": |
        {
          "cacheLimitMB": 2048,
          "enableCompression": true
        }

nodeAgent:
  extraArgs:
    - --node-agent-configmap=velero-node-agent-config
  resources:
    requests:
      cpu: 350m
      memory: 600M
    limits:
      # cpu: 90m
      memory: 2G


initContainers:
  - name: velero-plugin-for-aws
    image: velero/velero-plugin-for-aws:v1.14.1@sha256:1493a0039cd5cb31004cfbb52f8a1990bc0ed81497ce72516bc76fa9e21506c1
    volumeMounts:
      - mountPath: /target
        name: plugins

resources:
  requests:
    cpu: 22m
    memory: 128Mi
  limits:
    # cpu: 997m
    memory: 1066M

deployNodeAgent: true

# TODO revisit hourly exclusion and timeouts when prometheus calms down"
schedules:
  # idrive storage
  daily-idrive:
    disabled: false
    schedule: "30 3 * * *"
    template:
      ttl: "168h"
      storageLocation: idrive
      csiSnapshotTimeout: 30m
      excludedNamespaces:
        - velero
  weekly-idrive:
    disabled: false
    schedule: "30 4 * * 0"
    template:
      ttl: "672h"
      storageLocation: idrive
      csiSnapshotTimeout: 30m
      excludedNamespaces:
        - velero
  monthly-idrive:
    disabled: false
    schedule: "30 5 1 * *"
    template:
      ttl: "2190h"
      storageLocation: idrive
      csiSnapshotTimeout: 30m
      excludedNamespaces:
        - velero
  # default storage
  hourly-default:
    disabled: false
    schedule: "0 5-23/2 * * *"
    template:
      ttl: "24h"
      excludedNamespaces:
        - velero
        - monitoring
  daily-default:
    disabled: false
    schedule: "15 0 * * *"
    template:
      ttl: "168h"
      csiSnapshotTimeout: 30m
      excludedNamespaces:
        - velero
  weekly-default:
    disabled: false
    schedule: "15 1 * * 0"
    template:
      ttl: "672h"
      csiSnapshotTimeout: 30m
      excludedNamespaces:
        - velero
  monthly-default:
    disabled: false
    schedule: "15 2 1 * *"
    template:
      ttl: "2190h"
      csiSnapshotTimeout: 30m
      excludedNamespaces:
        - velero

metrics:
  enabled: true
  scrapeInterval: 30s
  scrapeTimeout: 10s

  # service metdata if metrics are enabled
  service:
    annotations: {}
    labels: {}

  # Pod annotations for Prometheus
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8085"
    prometheus.io/path: "/metrics"

  serviceMonitor:
    autodetect: false
    enabled: true
    annotations: {}
    additionalLabels: {}

  nodeAgentPodMonitor:
    autodetect: false
    enabled: true
    annotations: {}
    additionalLabels: {}

  prometheusRule:
    autodetect: false
    enabled: true
    additionalLabels:
      release: kube-prometheus-stack
    spec:
      - alert: VeleroLastBackupFailed
        annotations:
          # yamllint disable-line rule:line-length
          message: Velero backup {{ $labels.schedule }} {{ $labels.namespace }} failed last backups
        expr: velero_backup_last_status{schedule!=""} != 1
        for: 15m
        labels:
          severity: warning

      - alert: VeleroBackupItemsFailed
        annotations:
          # yamllint disable-line rule:line-length
          message: Velero backup {{ $labels.schedule }} {{ $labels.namespace }} has {{ $value }} failed items
        expr: velero_backup_items_errors{schedule!=""} != 0
        for: 15m
        labels:
          severity: warning
