---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/common-5.0.1/charts/library/common/values.schema.json

defaultPodOptions:
  automountServiceAccountToken: false
  securityContext:
    runAsUser: 0
    runAsGroup: 0
    fsGroup: 0

controllers:
  home-assistant:
    annotations:
      secret.reloader.stakater.com/reload: <-
        {{.Release.Name}}-secret,
        {{.Release.Name}}-github,
        {{.Release.Name}}-prometheus

    pod:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet

      annotations:
    #        pre.hook.backup.velero.io/container: sqlite-tools
    #        pre.hook.backup.velero.io/command: |
    #          /bin/sh -c '
    #          set -e
    #          echo "[velero] pre-backup sqlite WAL checkpoint"
    #          command -v sqlite3 >/dev/null
    #          sqlite3 /config/home-assistant_v2.db "PRAGMA wal_checkpoint(TRUNCATE);"
    #          sync
    #          '
    #        post.hook.restore.velero.io/container: sqlite-tools
    #        post.hook.restore.velero.io/command: |
    #          /bin/sh -c '
    #          set -e
    #          echo "[velero] post-restore sqlite integrity check"
    #          DB=/config/home-assistant_v2.db
    #
    #          if [ ! -f "$DB" ]; then
    #            echo "HA DB missing after restore — refusing to start"
    #            exit 1
    #          fi
    #
    #          if ! sqlite3 "$DB" "PRAGMA integrity_check;" | grep -q "^ok$"; then
    #            echo "HA DB integrity check FAILED — refusing to start"
    #            exit 1
    #          fi
    #
    #          echo "HA DB integrity check OK"
    #          '

    initContainers:
      config-initialization:
        image:
          repository: docker.io/alpine/git
          tag: 2.54.0@sha256:fac7bc2c12aa52bff1c78a26359990e149954a60cdd5d6e20e7e009666c73e0a
        command: ["/bin/sh", "-c"]
        args:
          - |-
            set -e
            # 1. Generate the Kopia ignore rules
            echo "Writing .kopiaignore..."
            tee /config/.kopiaignore <<!
            /.code-server/logs
            /.git
            /.venv
            /backups
            !

            # 2. Synchronize configuration state from GitHub if empty
            cd /config
            if [ ! -d .git ] ; then
              echo "Initializing config repository from GitHub..."
              mkdir temp-dir
              git clone https://github.com/mergwyn/home-assistant-config temp-dir
              mv temp-dir/.git .
              rm -rf temp-dir
              git checkout .
            fi

            # 3. DB Guardrails: Install sqlite3 inside the init container layer
            echo "[guardrail] Installing sqlite3 for validation..."
            apk add --no-cache sqlite

            DB=/config/home-assistant_v2.db
            echo "[guardrail] Checking Home Assistant SQLite DB..."
            if [ ! -f "$DB" ]; then
              echo "[guardrail] ERROR: DB missing — refusing to start"
              exit 1
            fi

            echo "[guardrail] Checking schema version..."
            if ! sqlite3 "$DB" "PRAGMA schema_version;" > /dev/null; then
              echo "[guardrail] ERROR: Schema version check failed — refusing to start"
              exit 1
            fi

            echo "[guardrail] Running WAL checkpoint..."
            if ! sqlite3 "$DB" "PRAGMA wal_checkpoint(TRUNCATE);" > /dev/null; then
              echo "[guardrail] ERROR: WAL checkpoint failed — refusing to start"
              exit 1
            fi

            echo "[guardrail] Checking schema..."
            if ! sqlite3 "$DB" "SELECT COUNT(*) FROM sqlite_master;" > /dev/null; then
              echo "[guardrail] ERROR: Schema check failed — refusing to start"
              exit 1
            fi
            echo "[guardrail] DB OK — validation complete."
        securityContext:
          runAsUser: 0

    containers:
      app:
        image:
          repository: ghcr.io/home-assistant/home-assistant
          # yamllint disable-line rule:line-length
          tag: "2026.7.1@sha256:f73512ba4fe06bb4d57636fe3578d0820cdec46f81e8f837ab59e451662ff3cb"
        env:
          TZ: Europe/London
          VENV_FOLDER: /venv
        envFrom:
          - secretRef:
              name: "{{.Release.Name}}-github"
        resources:
          requests:
            cpu: 163m
            memory: 1239M
          limits:
            memory: 2G

      sqlite-tools:
        image:
          repository: docker.io/library/alpine
          tag: 3.24@sha256:28bd5fe8b56d1bd048e5babf5b10710ebe0bae67db86916198a6eec434943f8b
        command: ["/bin/sh", "-c"]
        args:
          - apk add --no-cache sqlite && sleep infinity
        securityContext:
          runAsUser: 0

      code-server:
        image:
          repository: ghcr.io/coder/code-server
          # yamllint disable-line rule:line-length
          tag: 4.127.0@sha256:4193b3a0c2661bce87b3cafede59e7d50e1e99e35f7c10bece7c2a7e0660c0a8
        args:
          - --auth=none
          - --disable-telemetry
          - --disable-update-check
          - --user-data-dir=/config/.code-server
          - --extensions-dir=/config/.code-server
          # - --install-extension=trunk.io
          - --port=12322
          - /config
        env:
          TZ: Europe/London
          HASS_SERVER: http://localhost:8123
          # yamllint disable-line rule:line-length
          EXTENSIONS_GALLERY: '{ "serviceUrl": "https://marketplace.visualstudio.com/_apis/public/gallery", "itemUrl": "https://marketplace.visualstudio.com/items" }'
        envFrom:
          - secretRef:
              name: "{{.Release.Name}}-github"
        resources:
          requests:
            cpu: 10m
            memory: 978M
          limits:
            memory: 5G

service:
  app:
    forceRename: "{{.Release.Name}}"
    ports:
      http:
        port: &http-port 8123
  code-server:
    ports:
      http:
        port: &code-server-port 12322

serviceMonitor:
  app:
    enabled: true
    serviceName: "{{.Release.Name}}"
    endpoints:
      - port: http
        scheme: http
        interval: 1m
        scrapeTimeout: 30s
        path: /api/prometheus
        bearerTokenSecret:
          name: home-assistant-prometheus
          key: token

persistence:
  config:
    forceRename: "{{.Release.Name}}-config"
    type: persistentVolumeClaim
    storageClass: openebs-zfspv
    accessMode: ReadWriteOnce
    retain: true
    size: 10Gi
    globalMounts:
      - path: /config
  backups:
    enabled: true
    existingClaim: home-assistant-backup-nfs-pvc
    globalMounts:
      - path: /config/backups
  secrets:
    type: secret
    name: "{{.Release.Name}}-secret"
    advancedMounts:
      home-assistant:
        app:
          - path: /config/secrets.yaml
            subPath: secrets.yaml
            readOnly: true
  tmpfs:
    type: emptyDir
    advancedMounts:
      home-assistant:
        app:
          - path: /tmp
            subPath: hass-tmp
        code-server:
          - path: /tmp
            subPath: code-server-tmp
          - path: /nonexistent
            subPath: nonexistent

rawResources:
  rules:
    enabled: true
    manifest:
      kind: PrometheusRule
      apiVersion: monitoring.coreos.com/v1
      spec:
        groups:
          - name: home-assistant
            rules:
              - alert: HomeAssistantAbsent
                annotations:
                  description: |
                    Home Assistant has disappeared from
                    Prometheus service discovery.
                  summary: Home Assistant is down.
                expr: |
                  absent(up{job=~".*home-assistant.*"} == 1)
                for: 5m
                labels:
                  severity: critical
              - alert: HomeAssistantGuardrailTriggered
                expr: |
                  kube_pod_container_status_waiting_reason{
                    namespace="home-assistant",
                    pod=~"home-assistant-.*",
                    container="app",
                    reason="CrashLoopBackOff"
                  } > 0
                for: 5m
                labels:
                  severity: critical
                annotations:
                  summary: Home Assistant refused to start (DB guardrail)
                  description: |
                    Home Assistant is CrashLooping.
                    This usually indicates a failed SQLite integrity check
                    after restore or storage corruption.
