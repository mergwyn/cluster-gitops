---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/common-5.0.1/charts/library/common/values.schema.json
rawResources:
  externalsecret:
    enabled: true
    manifest:
      apiVersion: external-secrets.io/v1
      kind: ExternalSecret
      spec:
        secretStoreRef:
          kind: ClusterSecretStore
          name: bitwarden
        target:
          name: "{{.Release.Name}}-secret"
          creationPolicy: Owner
          template:
            data:
              # This gets hashed in an initContainer
              passwords: |
                {{`{{ .MQTT_USER }}`}}:{{`{{ .MQTT_PASSWORD }}`}}

        dataFrom:
          - extract:
              key: mqtt_credentials
