---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/common-5.0.1/charts/library/common/values.schema.json
rawResources:
  mqtt-credentials:
    enabled: true
    manifest:
      kind: ExternalSecret
      apiVersion: external-secrets.io/v1
      spec:
        secretStoreRef:
          kind: ClusterSecretStore
          name: bitwarden
        target:
          name: "{{.Release.Name}}-mqtt-credentials"
          creationPolicy: Owner
        dataFrom:
          - extract:
              key: mqtt_credentials
