---
rawResources:
  mqtt-credentials:
    enabled: true
    manifest:
      kind: ExternalSecret
      apiVersion: external-secrets.io/v1
      spec:
        secretStoreRef:
          kind: ClusterSecretStore
          name: bitwarden
        target:
          name: "{{.Release.Name}}-mqtt-credentials"
          creationPolicy: Owner
        dataFrom:
          - extract:
              key: mqtt_credentials
