    containers:
      multus:
        image:
          repository: ghcr.io/k8snetworkplumbingwg/multus-cni
          tag: v4.3.0-thick@sha256:2b9671447f3ea4e7e56730843dbf59445b9307246f393b61386b896d56ae51c9
    initContainers:
      cni-installer:
        image:
          repository: rancher/hardened-cni-plugins
          tag: v1.9.0-build20251215@sha256:095324ab04261e82dce08dd3824563837bad246f424f3f57612e1881c63a5f80

cni:
  paths:
    config: /var/lib/rancher/k3s/agent/etc/cni/net.d
