---
env:
  TZ: Europe/London

configs:
  params:
    # -- Run server without TLS
    server.insecure: true
    # -- Enables use of the Progressive Syncs capability
    # -- no longer set to sync by default
    applicationsetcontroller.enable.progressive.syncs: true

  secret:
    createSecret: false # Created using sops

  cm:
    create: true
    kustomize.buildOptions: --enable-helm
    application.resourceTrackingMethod: "annotation"
    controller.diff.server.side: "true"
    # Exclude velero backups and restores
    resource.exclusions: |
      - apiGroups:
          - "velero.io"
        kinds:
          - Backup
          - Restore
        clusters:
          - "*"
  rbac:
    policy.default: role:admin

repoServer:
  resources:
    requests:
      cpu: 20m
      memory: 308Mi
    limits:
      memory: 1400M

  initContainers:
    - name: download-tools
      image: alpine:3.19
      command: ["sh", "-c"]
      args:
        - |
          set -e

          # Renovate tracks these exact variables inline
          # renovate: datasource=github-releases depName=helmfile/helmfile
          CUSTOM_HELMFILE_VERSION="v1.5.2"
          # renovate: datasource=github-releases depName=getsops/sops
          CUSTOM_SOPS_VERSION="v3.9.4"
          # renovate: datasource=github-releases depName=helm/helm
          CUSTOM_HELM_VERSION="v4.1.4"
          # renovate: datasource=docker depName=ghcr.io/jkroepke/helm-secrets/secrets
          SECRETS_VER="4.7.4"
          # renovate: datasource=github-releases depName=databus23/helm-diff
          DIFF_VER="v3.15.7"

          # 1. Download Core Binaries
          #echo "Downloading Helm ${CUSTOM_HELM_VERSION}..."
          #wget -qO- "https://get.helm.sh/helm-${CUSTOM_HELM_VERSION}-linux-amd64.tar.gz" | tar -xz -C /tmp
          #mv /tmp/linux-amd64/helm /custom-tools/helm

          #echo "Downloading Helmfile ${CUSTOM_HELMFILE_VERSION}..."
          #HELMFILE_STRIPPED=$(echo ${CUSTOM_HELMFILE_VERSION} | sed 's/^v//')
          #wget -qO /custom-tools/helmfile "https://github.com/helmfile/helmfile/releases/download/${CUSTOM_HELMFILE_VERSION}/helmfile_${HELMFILE_STRIPPED}_linux_amd64"
          #chmod +x /custom-tools/helmfile

          #echo "Downloading SOPS ${CUSTOM_SOPS_VERSION}..."
          #wget -qO /custom-tools/sops "https://github.com/getsops/sops/releases/download/${CUSTOM_SOPS_VERSION}/sops-${CUSTOM_SOPS_VERSION}.linux.amd64"
          #chmod +x /custom-tools/sops

          # 2. Pre-install Helm Plugins cleanly using our fresh Helm 4 binary
          #echo "Pre-installing Helm plugins..."
          #export HELM_PLUGINS="/custom-tools/helm-plugins"

          #/custom-tools/helm plugin install oci://ghcr.io/jkroepke/helm-secrets/secrets:${SECRETS_VER}
          #/custom-tools/helm plugin install oci://ghcr.io/jkroepke/helm-secrets/secrets-getter:${SECRETS_VER}
          #/custom-tools/helm plugin install oci://ghcr.io/jkroepke/helm-secrets/secrets-post-renderer:${SECRETS_VER}
          #/custom-tools/helm plugin install https://github.com/databus23/helm-diff --version ${DIFF_VER}

          echo "All binaries and plugins ready!"
      volumeMounts:
        - mountPath: /custom-tools
          name: custom-tools

  volumes:
    - name: age-secret-keys
      secret:
        secretName: argocd-age-secret-keys
    - name: custom-tools
      emptyDir: {}

  volumeMounts:
    - name: age-secret-keys
      mountPath: /sops/age
    # Mount the compiled assets back into the native execution environment paths
    - name: custom-tools
      mountPath: /usr/local/bin/helmfile
      subPath: helmfile
    - name: custom-tools
      mountPath: /usr/local/bin/sops
      subPath: sops
    - name: custom-tools
      mountPath: /usr/local/bin/helm
      subPath: helm
    - name: custom-tools
      mountPath: /home/argocd/.local/share/helm/plugins
      subPath: helm-plugins

  cmp:
    plugins:
      helmfile-modern:
        generate:
          command: ["sh", "-c"]
          args: |
            export SOPS_AGE_KEY_FILE=/sops/age/keys.txt
            helmfile --namespace $HELMFILE_NAMESPACE --environment $HELMFILE_ENVIRONMENT template $HELMFILE_TEMPLATE_OPTIONS

  # TODO: remove this section when testing complete
  extraContainers:
    - name: helmfile-plugin
      image: travisghansen/argo-cd-helmfile:v0.3.13@sha256:1251e329f72cadaf55860b9029d13c887559b5f20287915f21d32d722aaeef2e
      command: [/var/run/argocd/argocd-cmp-server]
      env:
        - name: SOPS_AGE_KEY_FILE
          value: /sops/age/keys.txt
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
      volumeMounts:
        - mountPath: /sops/age
          name: age-secret-keys
        - mountPath: /var/run/argocd
          name: var-files
        - mountPath: /home/argocd/cmp-server/plugins
          name: plugins
        - mountPath: /tmp
          name: helmfile-cmp-tmp

server:
  # TODO test again when https://github.com/argoproj/argo-helm/issues/3550 resolved
  # httproute:
  #   enabled: true
  #   hostnames:
  #     - "{{.Release.Name}}.{{.Values.global.domain}}"
  #   parentRefs:
  #     - name: traefik-internal
  #       namespace: network
  # grpcroute:
  #   enabled: true
  #   hostnames:
  #     - "{{.Release.Name}}.{{.Values.global.domain}}"
  #   parentRefs:
  #     - name: traefik-internal
  #       namespace: network
  #   rules:
  #     - matches:
  #         - headers:
  #             - name: Content-Type
  #               type: RegularExpression
  #               value: "^application/grpc.*$"

  resources:
    requests:
      cpu: 15m
      memory: 236Mi
    limits:
      # cpu: 50m
      memory: 1416M

extraObjects:
  - kind: IngressRoute
    apiVersion: traefik.io/v1alpha1
    metadata:
      name: argocd-server
      namespace: argocd
    spec:
      ingressClassName: traefik-external
      entryPoints:
        - websecure
      routes:
        - kind: Rule
          match: Host(`argocd.theclarkhome.com`)
          priority: 10
          services:
            - name: argocd-server
              port: 80
        - kind: Rule
          # yamllint disable-line rule:line-length
          match: Host(`argocd.theclarkhome.com`) && Header(`Content-Type`, `application/grpc`)
          priority: 11
          services:
            - name: argocd-server
              port: 80
              scheme: h2c
      tls: {}

controller:
  resources:
    requests:
      cpu: 350m
      memory: 1844Mi
    limits:
      memory: 2048Mi

applicationSet:
  resources:
    requests:
      cpu: 15m
      memory: 105M
    limits:
      # cpu: 34m
      memory: 1183M

dex:
  resources:
    requests:
      cpu: 15m
      memory: 105M
    limits:
      # cpu: 16m
      memory: 750M

notifications:
  resources:
    requests:
      cpu: 15m
      memory: 105M
    limits:
      # cpu: 16m
      memory: 750M

redis:
  resources:
    requests:
      cpu: 22m
      memory: 105M
    limits:
      # cpu: 52m
      memory: 174M
