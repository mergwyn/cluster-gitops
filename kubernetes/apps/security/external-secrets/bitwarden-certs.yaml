---
resources:
  - apiVersion: cert-manager.io/v1
    kind: Certificate
    metadata:
      name: bitwarden-tls-certs
    spec:
      secretName: bitwarden-tls-certs
      isCA: true
      dnsNames:
        - bitwarden-sdk-server.security.svc.cluster.local
        - localhost
      ipAddresses:
        - 127.0.0.1
        - ::1
      privateKey:
        algorithm: RSA
        encoding: PKCS8
        size: 2048
        rotationPolicy: Always
      duration: 168h
      renewBefore: 24h
      issuerRef:
        name: cluster-signed-issuer
        kind: ClusterIssuer
        group: cert-manager.io
  - apiVersion: cert-manager.io/v1
    kind: Certificate
    metadata:
      name: bitwarden-css-certs
    spec:
      secretName: bitwarden-css-certs
      isCA: true
      dnsNames:
        - bitwarden-sdk-server.security.svc.cluster.local
        - localhost
      ipAddresses:
        - 127.0.0.1
        - ::1
      privateKey:
        algorithm: RSA
        encoding: PKCS8
        size: 2048
        rotationPolicy: Always
      duration: 168h
      renewBefore: 24h
      issuerRef:
        name: cluster-signed-issuer
        kind: ClusterIssuer
        group: cert-manager.io
