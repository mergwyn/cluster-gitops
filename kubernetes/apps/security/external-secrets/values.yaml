---
# yaml-language-server: $schema=https://raw.githubusercontent.com/external-secrets/external-secrets/refs/heads/main/deploy/charts/external-secrets/values.schema.json

installCRDs: true

replicaCount: &replicas 1

serviceMonitor:
  enabled: true
  interval: 1m

resources:
  requests:
    cpu: 10m
    memory: 150Mi
  limits:
    memory: 200Mi

certController:
  image:
    repository: ghcr.io/external-secrets/external-secrets
  serviceMonitor:
    enabled: true
    interval: 1m
  resources:
    requests:
      cpu: 10m
      memory: 150Mi
    limits:
      memory: 150Mi

webhook:
  image:
    repository: ghcr.io/external-secrets/external-secrets
  serviceMonitor:
    enabled: true
    interval: 1m
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
    limits:
      memory: 100Mi

grafanaDashboard:
  enabled: true

bitwarden-sdk-server:
  enabled: true
  replicaCount: *replicas
  podAnnotations:
    secret.reloader.stakater.com/reload: |
      'bitwarden-access-token,bitwarden-tls-certs,bitwarden-css-certs'
