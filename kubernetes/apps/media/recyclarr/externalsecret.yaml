---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/common-5.0.1/charts/library/common/values.schema.json
rawResources:
  externalsecret:
    enabled: true
    manifest:
      kind: ExternalSecret
      apiVersion: external-secrets.io/v1
      spec:
        secretStoreRef:
          kind: ClusterSecretStore
          name: bitwarden
        target:
          name: "{{.Release.Name}}-secret"
          creationPolicy: Owner
          template:
            data:
              RADARR_API_KEY: "{{`{{ .RADARR__AUTH__API_KEY }}`}}"
              SONARR_API_KEY: "{{`{{ .SONARR__AUTH__API_KEY }}`}}"
        dataFrom:
          - extract:
              key: sonarr_api_key
          - extract:
              key: radarr_api_key
