---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/common-5.0.1/charts/library/common/values.schema.json

controllers:
  recyclarr:
    enabled: true
    type: cronjob
    cronjob:
      schedule: 0 0 * * *
      backoffLimit: 0
      concurrencyPolicy: Forbid
      successfulJobsHistory: 1
      failedJobsHistory: 1
      ttlSecondsAfterFinished: 86400

    containers:
      app:
        image:
          repository: ghcr.io/recyclarr/recyclarr
          # yamllint disable rule:line-length
          tag: 8.6.0@sha256:3c38ceeb54438dd8327e4e65c9b48ba601a6d20fff833342d93c9b0bc4b1930b
        env:
          TZ: "Europe/London"
        envFrom:
          - secretRef:
              name: "{{ .Release.Name }}-secret"
        args:
          - sync
          # - --debug
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities: { drop: ["ALL"] }
        resources:
          requests:
            cpu: 10m
          limits:
            memory: 128Mi
    pod:
      restartPolicy: Never

defaultPodOptions:
  securityContext:
    runAsNonRoot: true
    runAsUser: 3001
    runAsGroup: 513
    fsGroup: 513
    fsGroupChangePolicy: OnRootMismatch

persistence:
  config:
    type: emptyDir
    globalMounts:
      - path: /config
  config-file:
    type: configMap
    name: "{{ .Release.Name }}"
    globalMounts:
      - path: /config/recyclarr.yml
        subPath: recyclarr.yml
  tmp:
    type: emptyDir

configMaps:
  config:
    enabled: true
    data:
      recyclarr.yml: |-
        # -------------------------------------------------------------
        # SONARR CONFIGURATION
        # -------------------------------------------------------------
        sonarr:
          sonarr:
            base_url: http://sonarr.vpn.svc.cluster.local:8989
            api_key: !env_var SONARR_API_KEY
            delete_old_custom_formats: true

            # Auto-manage modern file-size constraints
            quality_definition:
              type: series

            # v8+ expects profiles declared as references here
            quality_profiles:
              - name: WEB-1080p

            # v8+ expects custom_formats at the root level of the instance
            custom_formats:
              # General Release Filtering (Trash Defaults)
              - trash_ids:
                  - 32b367365729d530ca1c124a0b180c64  # Bad Dual Groups
                  - 82d40da2bc6923f41e14394075dd4b03  # No-RlsGroup
                  - e1a997ddb54e3ecbfe06341ad323c458  # Obfuscated
                  - 06d66ab109d4d2eddb2794d21526d140  # Retags
                  - 1b3994c551cbb92a2c781af061f4ab44  # Scene
                assign_scores_to:
                  - name: WEB-1080p
                    score: 0

              # Block non-fallback DV on Sonarr
              - trash_ids:
                  - d776a1ea912a117d66d83b880ff2055d  # DV (w/o HDR fallback)
                assign_scores_to:
                  - name: WEB-1080p
                    score: -1000

            media_naming:
              include_custom_format_when_renaming: true
              series: "{Series TitleYear} [tvdbid-{TvdbId}]"
              season: "Season {season:00}"
              episodes:
                rename: true
                standard: "{Series TitleYear} - S{season:00}E{episode:00} - {Episode CleanTitle} [{Custom Formats}][{Quality Full}][{MediaInfo VideoDynamicRange}][{MediaInfo VideoCodec}][{Mediainfo AudioCodec} {MediaInfo AudioChannels}][-{Release Group}]"
                daily: "{Series TitleYear} - {Episode AirDate} - {Episode CleanTitle} [{Custom Formats}][{Quality Full}][{MediaInfo VideoDynamicRange}][{MediaInfo VideoCodec}][{Mediainfo AudioCodec} {MediaInfo AudioChannels}][-{Release Group}]"
                anime: "{Series TitleYear} - S{season:00}E{episode:00} - {Episode CleanTitle} [{Custom Formats}][{Quality Full}][{MediaInfo VideoDynamicRange}][{MediaInfo VideoCodec}][{Mediainfo AudioCodec} {MediaInfo AudioChannels}][-{Release Group}]"

        # -------------------------------------------------------------
        # RADARR CONFIGURATION
        # -------------------------------------------------------------
        radarr:
          radarr:
            base_url: http://radarr.vpn.svc.cluster.local:7878
            api_key: !env_var RADARR_API_KEY
            delete_old_custom_formats: true

            quality_definition:
              type: movie

            quality_profiles:
              - name: SQP-1 (2160p)

            # v8+ expects custom_formats at the root level of the instance
            custom_formats:
              # Avoid SDR x265 bloat and use the corrected Radarr Profile 5 fallback ID
              - trash_ids:
                  - 839bea857ed2c0a8e084f3cbdbd65ecb  # x265 (no HDR/DV)
                  - 923b6abef9b17f937fab56cfcf89e1f1  # DV (w/o HDR fallback)
                assign_scores_to:
                  - name: SQP-1 (2160p)
                    score: -1000

              # General Release Filtering (Trash Defaults)
              - trash_ids:
                  - b6832f586342ef70d9c128d40c07b872  # Bad Dual Groups
                  - cc444569854e9de0b084ab2b8b1532b2  # Black and White Editions
                  - ae9b7c9ebde1f3bd336a8cbd1ec4c5e5  # No-RlsGroup
                  - 7357cf5161efbf8c4d5d0c30b4815ee2  # Obfuscated
                  - 5c44f52a8714fdd79bb4d98e2673be1f  # Retags
                  - f537cf427b64c38c8e36298f657e4828  # Scene
                assign_scores_to:
                  - name: SQP-1 (2160p)
                    score: 0

            media_naming:
              include_custom_format_when_renaming: true
              folder: "{Movie CleanTitle} ({Release Year}) [imdb-{ImdbId}]"
              movie:
                rename: true
                standard: "{Movie CleanTitle} ({Release Year}) {Edition Tags} [imdb-{ImdbId}] [{Custom Formats}][{Quality Full}][{MediaInfo VideoDynamicRange}][{MediaInfo VideoBitDepth}bit][{MediaInfo VideoCodec}][{Mediainfo AudioCodec} {MediaInfo AudioChannels}][-{Release Group}]"
