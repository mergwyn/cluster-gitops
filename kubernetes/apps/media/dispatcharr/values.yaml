---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/common-5.0.1/charts/library/common/values.schema.json

controllers:
  dispatcharr:
    enabled: true
    type: deployment
    containers:
      app:
        image:
          repository: ghcr.io/dispatcharr/dispatcharr
          tag: 0.28.2@sha256:3eb0ec779f3437ec64c08a9b3f545a355a8f512f3740cdeaac42b80f1021637d
        env:
          dispatcharr_env: aio
          redis_host: localhost
          celery_broker_url: redis://localhost:6379/0
          dispatcharr_log_level: info
        resources:
          requests:
            cpu: 400m
            memory: 1658Mi
            # enable gpu if ffmpeg profile being used
            # gpu.intel.com/i915: "1"
          limits:
            memory: 2Gi
            # enable gpu if ffmpeg profile being used
            # gpu.intel.com/i915: "1"

service:
  # Configure a service for the main application
  app:
    type: ClusterIP
    ports:
      http:
        port: 9191

persistence:
  data:
    type: persistentVolumeClaim
    storageClass: longhorn
    accessMode: ReadWriteOnce
    retain: true
    size: 2Gi
