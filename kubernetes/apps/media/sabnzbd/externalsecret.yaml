# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/common-5.0.1/charts/library/common/values.schema.json
rawResources:
  externalsecret:
    enabled: true
    manifest:
      kind: ExternalSecret
      apiVersion: external-secrets.io/v1
      spec:
        secretStoreRef:
          kind: ClusterSecretStore
          name: bitwarden
        target:
          # key needs to use *ARR__API_KEY
          name: "{{.Release.Name}}-api-key"
        dataFrom:
          - extract:
              key: sabnzbd_api_key
