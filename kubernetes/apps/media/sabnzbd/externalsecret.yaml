rawResources:
  externalsecret:
    enabled: true
    manifest:
      kind: ExternalSecret
      apiVersion: external-secrets.io/v1
      spec:
        secretStoreRef:
          kind: ClusterSecretStore
          name: bitwarden
        target:
          # key needs to use *ARR__API_KEY
          name: "{{.Release.Name}}-api-key"
        dataFrom:
          - extract:
              key: sabnzbd_api_key
