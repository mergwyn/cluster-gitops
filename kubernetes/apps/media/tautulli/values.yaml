---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/common-5.0.1/charts/library/common/values.schema.json

controllers:
  tautulli:
    enabled: true
    type: deployment
    annotations:
      reloader.stakater.com/auto: "true"

    initContainers:
      create-kopiaignore:
        image:
          repository: busybox
          tag: latest@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
        command:
          - sh
          - -c
          - mkdir -p /config/cache && echo '*' > /config/cache/.kopiaignore

    containers:
      app:
        image:
          repository: ghcr.io/home-operations/tautulli
          tag: 2.17.2@sha256:7592e192e2dd5297054a80c0f1e8b2593f7675af75c5020806b30c712e159406
        env:
          TZ: "Europe/London"
        probes:
          liveness: &probes
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /status
                port: &port 8181
              initialDelaySeconds: 0
              periodSeconds: 10
              timeoutSeconds: 1
              failureThreshold: 3
          readiness: *probes
        resources:
          requests:
            cpu: 15m
            memory: 125Mi
          limits:
            memory: 250Mi

defaultPodOptions:
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
    runAsGroup: 65534
    fsGroup: 65534
    fsGroupChangePolicy: OnRootMismatch

service:
  # Configure a service for the main application
  app:
    forceRename: "{{.Release.Name}}"
    type: ClusterIP
    ports:
      http:
        port: *port

persistence:
  config:
    type: persistentVolumeClaim
    storageClass: longhorn
    accessMode: ReadWriteOnce
    retain: true
    size: 2Gi
    globalMounts:
      - path: /config
  tmpfs:
    type: emptyDir
    advancedMounts:
      tautulli:
        app:
          - path: /config/logs
            subPath: logs
          - path: /tmp
            subPath: tmp
