defaultSettings:
  defaultReplicaCount: 3
  concurrentReplicaRebuildPerNodeLimit: 3
  replicaSoftAntiAffinity: false
  replicaAutoBalance: best-effort
  defaultDataLocality: best-effort
  createDefaultDiskLabeledNodes: true
  storageOverProvisioningPercentage: 150
  storageMinimalAvailablePercentage: 10
  backupTarget: ""
  v2DataEngine: false

persistence:
  defaultClassReplicaCount: 3
  defaultClass: true

ingress:
  enabled: false

longhornUI:
  replicas: 1

longhornManager:
  resources: {}
#    requests:
#      cpu: 25m
#      memory: 128Mi
#    limits:
#      memory: 256Mi

#metrics:
#  serviceMonitor:
#    enabled: true

extraObjects:
  - apiVersion: longhorn.io/v1beta2
    kind: RecurringJob
    metadata:
      name: snapshot-purge-job
      namespace: longhorn-system
      labels:
        app.kubernetes.io/managed-by: "Helm"
      annotations:
        meta.helm.sh/release-name: "{{.Release.Name}}"
        meta.helm.sh/release-namespace: "{{.Release.Namespace}}"
    spec:
      task: "snapshot-delete"
      cron: "45 6 * * *"
      retain: 1
      concurrency: 1
      groups:
        - default

  - apiVersion: storage.k8s.io/v1
    kind: StorageClass
    metadata:
      name: longhorn-velero-backup
    provisioner: driver.longhorn.io
    allowVolumeExpansion: true
    reclaimPolicy: Delete
    volumeBindingMode: Immediate
    parameters:
      numberOfReplicas: "1"
      staleReplicaTimeout: "30"
      fsType: "ext4"

  - apiVersion: snapshot.storage.k8s.io/v1
    kind: VolumeSnapshotClass
    metadata:
      name: longhorn-snapshot
      annotations:
        snapshot.storage.kubernetes.io/is-default-class: "true"
      labels:
        velero.io/csi-volumesnapshot-class: "true"
    driver: driver.longhorn.io
    deletionPolicy: Delete
    parameters:
      type: snap

      # Custom PrometheusRule for Longhorn-specific alerts, including our custom orphaned ghost volume tracking
  - apiVersion: monitoring.coreos.com/v1
    kind: PrometheusRule
    metadata:
      name: longhorn-alerts
      namespace: monitoring
      labels:
        release: kube-prometheus-stack
        app.kubernetes.io/managed-by: "Helm"
      annotations:
        meta.helm.sh/release-name: "{{.Release.Name}}"
        meta.helm.sh/release-namespace: "{{.Release.Namespace}}"

    spec:
      groups:
        - name: longhorn.storage.alerts
          rules:
            # 1. THE GHOST VOLUME ALERT (Our custom tracking fix)
            - alert: LonghornOrphanedGhostVolume
              expr: |
                longhorn_volume_state{state="detached"} == 1
                and on(volume) longhorn_volume_actual_size_bytes
              for: 1h
              labels:
                severity: warning
              annotations:
                summary: "Orphaned Longhorn volume detected: {{`{{ $labels.volume }}`}}"
                description: "The volume '{{`{{ $labels.volume }}`}}' is detached with no bounding Kubernetes PV record. Clean it up using: 'kubectl delete volume.longhorn.io {{`{{ $labels.volume }}`}} -n longhorn-system'"

            # 2. VOLUME FAULTED (Critical Data Loss Indicator)
            - alert: LonghornVolumeFaulted
              expr: longhorn_volume_robustness{state="faulted"} == 1
              for: 1m
              labels:
                severity: critical
              annotations:
                summary: "Longhorn Volume Faulted: {{`{{ $labels.volume }}`}}"
                description: "Volume '{{`{{ $labels.volume }}`}}' has entered a FAULTED state. All storage replicas are unavailable."

            # 3. VOLUME DEGRADED (Loss of High-Availability Replication)
            - alert: LonghornVolumeDegraded
              expr: longhorn_volume_robustness{state="degraded"} == 1
              for: 15m
              labels:
                severity: warning
              annotations:
                summary: "Longhorn Volume Degraded: {{`{{ $labels.volume }}`}}"
                description: "Volume '{{`{{ $labels.volume }}`}}' is degraded. One or more replicas are unhealthy or missing."

            # 4. PHYSICAL DISK SPACE EXHAUSTION (Critical Node Storage Level)
            - alert: LonghornDiskSpaceCritical
              expr: (longhorn_disk_usage_bytes / longhorn_disk_capacity_bytes) > 0.90
              for: 5m
              labels:
                severity: critical
              annotations:
                summary: "Longhorn Node Disk Space Critical: {{`{{ $labels.node }}`}}"
                description: "Physical disk paths on node '{{`{{ $labels.node }}`}}' have exceeded 90% space utilization. Clean out unused assets before safety locks engage."
