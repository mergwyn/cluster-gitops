---

prometheusRules:
  enabled: true
  extraLabels:
    release: kube-prometheus-stack

serviceMonitor:
  enabled: true
  labels:
    release: kube-prometheus-stack
  attachMetadata:
    node: true
  relabelings:
    - sourceLabels: [__meta_kubernetes_pod_node_name]
      targetLabel: instance
      action: replace

resources:
  requests:
    cpu: 15m
    memory: 105M
  limits:
    # cpu: 21m
    memory: 105M
