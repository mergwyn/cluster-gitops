---
upgradeCRDs: false

annotations:
  secret.reloader.stakater.com/reload: <-
    minio-s3-conf,
    idrivee2-s3-conf
  configmap.reloader.stakater.com/reload: <-
    velero-backup-repository-config

defaultBackupStorageLocation: rustfs
snapshotsEnabled: false
# defaultVolumeSnapshotLocations: [minio, idrive, default]
defaultRepoMaintainFrequency: 24h

kubectl:
  image:
    repository: public.ecr.aws/bitnami/kubectl
    tag: 1.36.0@sha256:e5a1e75a0e7a8521e6e7930adb88efa354ff95443001c110fd76d9b1ad5c4714

configuration:
  uploaderType: kopia
  # defaultVolumesToFsBackup: true
  defaultSnapshotMoveData: true
  features: EnableCSI
  defaultRepoMaintainFrequency: 24h
  defaultExcludedNamespaces:
    - velero
    - kube-system

  backupStorageLocation:
    - name: minio
      default: true
      provider: aws
      bucket: velero
      credential:
        name: minio-s3-conf
        key: cloud
      config:
        region: Northallerton
        s3ForcePathStyle: true
        s3Url: http://delta.theclarkhome.com:9000
        publicUrl: http://delta.theclarkhome.com:9000

    - name: idrive
      provider: aws
      bucket: velero
      credential:
        name: idrivee2-s3-conf
        key: cloud
      config:
        region: London
        s3ForcePathStyle: true
        s3Url: https://j5o6.ldn.idrivee2-27.com
        publicUrl: https://j5o6.ldn.idrivee2-27.com
        # Disable checksumAlgorithm to avoid issues with Minio
        # https://github.com/vmware-tanzu/velero-plugin-for-aws/pull/197
        checksumAlgorithm: ""

  extraArgs:
    - "--backup-repository-configmap=velero-backup-repository-config"

configMaps:
  backup-repository-config:
    data:
      "kopia": |
        {
          "cacheLimitMB": 2048,
          "enableCompression": true
        }

initContainers:
  - name: velero-plugin-for-aws
    image: velero/velero-plugin-for-aws:v1.14.0@sha256:7e82f717f44e89671212e0dfce7e061321c386ea84a33bca64a671670ca6c278
    volumeMounts:
      - mountPath: /target
        name: plugins

resources:
  requests:
    cpu: 22m
    memory: 128Mi
  limits:
    # cpu: 997m
    memory: 1066M

deployNodeAgent: true

nodeAgent:
  resources:
    requests:
      cpu: 350m
      memory: 600M
    limits:
      # cpu: 90m
      memory: 2G

schedules:
  # idrive storage
  daily-idrive:
    disabled: false
    schedule: "30 0 * * *"
    template:
      ttl: "168h"
      storageLocation: idrive
      # volumeSnapshotLocations: &idrivesnap []  # [idrive]
  weekly-idrive:
    disabled: false
    schedule: "30 1 * * 0"
    template:
      ttl: "672h"
      storageLocation: idrive
      # volumeSnapshotLocations: *idrivesnap
  monthly-idrive:
    disabled: false
    schedule: "30 2 1 * *"
    template:
      ttl: "2190h"
      storageLocation: idrive
      # volumeSnapshotLocations: *idrivesnap
  # default storage
  hourly-default:
    disabled: false
    schedule: "0 */2 * * *"
    template:
      ttl: "24h"
  daily-default:
    disabled: false
    schedule: "15 0 * * *"
    template:
      ttl: "168h"
  weekly-default:
    disabled: false
    schedule: "15 1 * * 0"
    template:
      ttl: "672h"
  monthly-default:
    disabled: false
    schedule: "15 2 1 * *"
    template:
      ttl: "2190h"

metrics:
  enabled: true
  scrapeInterval: 30s
  scrapeTimeout: 10s

  # service metdata if metrics are enabled
  service:
    annotations: {}
    labels: {}

  # Pod annotations for Prometheus
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8085"
    prometheus.io/path: "/metrics"

  serviceMonitor:
    autodetect: false
    enabled: true
    annotations: {}
    additionalLabels: {}

  nodeAgentPodMonitor:
    autodetect: false
    enabled: true
    annotations: {}
    additionalLabels: {}

  prometheusRule:
    autodetect: false
    enabled: true
    additionalLabels:
      release: kube-prometheus-stack
    spec:
      - alert: VeleroLastBackupFailed
        annotations:
          # yamllint disable-line rule:line-length
          message: Velero backup {{ $labels.schedule }} {{ $labels.namespace }} failed last backups
        expr: velero_backup_last_status{schedule!=""} != 1
        for: 15m
        labels:
          severity: warning

      - alert: VeleroBackupItemsFailed
        annotations:
          # yamllint disable-line rule:line-length
          message: Velero backup {{ $labels.schedule }} {{ $labels.namespace }} has {{ $value }} failed items
        expr: velero_backup_items_errors{schedule!=""} != 0
        for: 15m
        labels:
          severity: warning
