---
name: ApplicationSet Safety

on:
  pull_request:
    paths:
      - "kubernetes/argocd/appsets/**"
      - "kubernetes/**/app.yaml"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Install yq
        uses: mikefarah/yq@1b9b4ac5187171d2e5e3129be0cfa827c7f9d53d # v4.53.3

      - name: Validate required fields in app.yaml
        run: |
          set -e
          echo "🔍 Validating required keys in app.yaml files"
          find . -name app.yaml -print0 | while IFS= read -r -d '' f; do
            yq e ' .wave and
                   .namespace' "$f" > /dev/null \
              || { echo "❌ Missing required field in $f"; exit 1; }
          done
